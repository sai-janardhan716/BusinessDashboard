<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operations — StartupOps</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar" id="sidebar">
      <a class="sidebar-brand" href="dashboard.html">
        <div class="brand-icon"><i class='bx bxs-rocket'></i></div>
        <span class="brand-name"></span>
      </a>
      <nav class="sidebar-nav" id="sidebarMenu"></nav>
      <div class="sidebar-user">
        <div class="user-avatar"></div>
        <div class="user-details">
          <span class="user-name-display"></span>
          <span class="user-role-display"></span>
        </div>
      </div>
    </aside>

    <div class="main-content">
      <div class="page-header">
        <div class="page-header-left">
          <span class="page-eyebrow">Operations</span>
          <h1 class="page-title">Operational Tasks</h1>
          <p class="page-subtitle">Manage tasks, owners and operational status</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" id="addOpBtn"><i class='bx bx-plus'></i> Add Item</button>
        </div>
      </div>

      <div class="content-body">
        <div class="panel">
          <div class="toolbar">
            <div class="search-box">
              <i class='bx bx-search'></i>
              <input type="text" id="opSearch" placeholder="Search tasks…" />
            </div>
            <select id="catFilter" class="filter-select">
              <option value="">All Categories</option>
              <option>Tech</option>
              <option>Admin</option>
              <option>Finance</option>
              <option>HR</option>
              <option>Legal</option>
            </select>
            <select id="statusFilter" class="filter-select">
              <option value="">All Status</option>
              <option>Active</option>
              <option>On Hold</option>
              <option>Completed</option>
              <option>Inactive</option>
            </select>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Category</th>
                  <th>Status</th>
                  <th>Owner</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="opTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>


  <div class="modal-overlay" id="opForm">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add Operational Item</span>
        <button class="modal-close" id="closeOpModal">&times;</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Item Name</label><input id="oName" placeholder="Server Maintenance" /></div>
        <div class="form-group">
          <label>Category</label>
          <select id="oCat">
            <option>Tech</option>
            <option>Admin</option>
            <option>Finance</option>
            <option>HR</option>
            <option>Legal</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="oStatus">
            <option>Active</option>
            <option>On Hold</option>
            <option>Completed</option>
            <option>Inactive</option>
          </select>
        </div>
        <div class="form-group"><label>Owner</label><input id="oOwner" placeholder="John Smith" /></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="closeOpModal2">Cancel</button>
        <button class="btn btn-primary" id="saveOp">Save Item</button>
      </div>
    </div>
  </div>

  <script src="../js/sidebar.js"></script>
  <script src="../js/operations.js"></script>
</body>

</html>
