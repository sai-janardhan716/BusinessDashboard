<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — StartupOps</title>
  <meta name="description" content="Set a new password for your StartupOps account." />
  <link rel="stylesheet" href="../css/reset-password.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
  <div class="reset-container">

    <div class="brand-logo">
      <i class="bx bxs-business"></i>
      <span>StartupOps</span>
    </div>

    <div class="reset-card">
      <h2>Set Your Password</h2>
      <p class="subtitle">
        Your account was created by your Founder with a temporary password.<br />
        Set a permanent password to access your dashboard.
      </p>

      <div class="warning-badge">
        <i class="bx bx-time-five"></i>
        Temporary passwords expire after 24 hours.
      </div>

      <form id="resetForm" novalidate>

        <div class="form-group">
          <label for="currentPassword">Temporary Password</label>
          <div class="input-with-icon">
            <i class="bx bx-lock-open-alt"></i>
            <input type="password" id="currentPassword" placeholder="Enter temp password" required />
            <i class="bx bx-hide toggle-eye" id="toggleCurrent"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="input-with-icon">
            <i class="bx bx-lock-alt"></i>
            <input type="password" id="newPassword" placeholder="Min. 8 characters" required />
            <i class="bx bx-hide toggle-eye" id="toggleNew"></i>
          </div>
          <div class="strength-bar-wrap">
            <div class="strength-bar" id="strengthBar"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="input-with-icon">
            <i class="bx bx-check-shield"></i>
            <input type="password" id="confirmPassword" placeholder="Re-enter new password" required />
            <i class="bx bx-hide toggle-eye" id="toggleConfirm"></i>
          </div>
        </div>

        <button type="submit" class="btn-reset" id="submitBtn">
          <i class="bx bx-shield-check"></i> Set Password & Continue
        </button>

        <p class="message" id="message"></p>

      </form>
    </div>
  </div>

  <script src="../js/reset-password.js"></script>
</body>

</html>
