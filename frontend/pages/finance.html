<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance - Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar" id="sidebar">
      <a class="sidebar-brand" href="dashboard.html">
        <div class="brand-icon"><i class="bx bx-buildings"></i></div>
        <span class="brand-name"></span>
      </a>
      <nav class="sidebar-nav" id="sidebarMenu"></nav>
      <div class="sidebar-user">
        <div class="user-avatar"></div>
        <div class="user-details">
          <span class="user-name-display"></span>
          <span class="user-role-display"></span>
        </div>
      </div>
    </aside>

    <div class="main-content">
      <div class="page-header">
        <div class="page-header-left">
          <span class="page-eyebrow">Finance</span>
          <h1 class="page-title">Revenue & Expenses</h1>
          <p class="page-subtitle">Track income, expenses and financial health</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-ghost" id="addExpenseBtn"><i class='bx bx-minus-circle'></i> Expense</button>
          <button class="btn btn-primary" id="addRevenueBtn"><i class='bx bx-plus'></i> Revenue</button>
        </div>
      </div>

      <div class="content-body">
        <div class="kpi-grid">
          <div class="kpi-card kpi-green">
            <div class="kpi-body">
              <div class="kpi-label">Total Revenue</div>
              <div class="kpi-value" id="totalRevenue">₹0</div>
              <div class="kpi-trend up"><i class='bx bx-trending-up'></i> +15%</div>
            </div>
            <div class="kpi-icon green"><i class='bx bx-rupee'></i></div>
          </div>
          <div class="kpi-card kpi-red">
            <div class="kpi-body">
              <div class="kpi-label">Total Expenses</div>
              <div class="kpi-value" id="totalExpense">₹0</div>
              <div class="kpi-trend down"><i class='bx bx-trending-down'></i> —</div>
            </div>
            <div class="kpi-icon red"><i class='bx bx-trending-down'></i></div>
          </div>
          <div class="kpi-card kpi-indigo">
            <div class="kpi-body">
              <div class="kpi-label">Net Profit</div>
              <div class="kpi-value" id="netProfit">₹0</div>
            </div>
            <div class="kpi-icon indigo"><i class='bx bx-line-chart'></i></div>
          </div>
          <div class="kpi-card kpi-amber">
            <div class="kpi-body">
              <div class="kpi-label">Monthly Burn</div>
              <div class="kpi-value" id="monthlyBurn">₹0</div>
            </div>
            <div class="kpi-icon amber"><i class="bx bx-down-arrow-circle"></i></div>
          </div>
        </div>

        <div class="grid-2">
          <div class="panel">
            <div class="panel-head">
              <div class="panel-title">Transactions</div>
            </div>
            <div class="toolbar">
              <div class="search-box">
                <i class='bx bx-search'></i>
                <input type="text" id="financeSearch" placeholder="Search transactions…" />
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="financeTable"></tbody>
              </table>
              <div class="pagination-bar">
                <div class="pagination-info">
                  <span id="pageInfo"></span>
                </div>
                <div class="pagination-controls">
                  <button class="btn btn-sm btn-ghost" id="prevPage" onclick="changePage(-1)"><i class="bx bx-chevron-left"></i> Prev</button>
                  <span id="pageNumbers" class="page-numbers"></span>
                  <button class="btn btn-sm btn-ghost" id="nextPage" onclick="changePage(1)">Next <i class="bx bx-chevron-right"></i></button>
                </div>
                <div class="pagination-size">
                  <label>Rows:</label>
                  <select id="pageSizeSelect" onchange="changePageSize(this.value)">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <div class="panel-title">Revenue vs Expense</div>
            </div>
            <div class="panel-body">
              <canvas id="financeChart" style="max-height:320px;"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <div class="modal-overlay" id="financeForm">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="formTitle">Add Transaction</span>
        <button class="modal-close" id="closeFinanceModal">&times;</button>
      </div>
      <div class="form-group"><label>Date</label><input type="date" id="fDate" /></div>
      <div class="form-group"><label>Amount (₹)</label><input type="number" id="fAmount" placeholder="0" /></div>
      <div class="form-group"><label>Description</label><input type="text" id="fDesc" placeholder="e.g. Office Rent" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="closeFinanceModal2">Cancel</button>
        <button class="btn btn-primary" id="saveFinance">Save</button>
      </div>
    </div>
  </div>

  <script src="../js/authGuard.js"></script>
  <script src="../js/finance.js"></script>
  <script src="../js/sidebar.js"></script>
</body>

</html>
